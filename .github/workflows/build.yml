name: Build Quantum C

on: [push, pull_request]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build
        run: |
          g++ *.cpp *.h -o qc-macos -std=c++20 -fconstexpr-ops-limit=100000000
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: qc-macos
          path: qc-macos
  
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build
        run: |
          g++ *.cpp *.h -o qc-linux -std=c++20 -fconstexpr-ops-limit=100000000
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: qc-linux
          path: qc-linux
  
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build
        run: |
          g++ *.cpp *.h -o qc-windows.exe -std=c++20 -fconstexpr-ops-limit=100000000
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: qc-windows
          path: qc-windows.exe